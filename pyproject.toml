[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
    "--no-header",
    "-rN",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks integration tests that require real services",
]

[tool.ruff]
line-length = 100
target-version = "py312"
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501", "B008", "UP007"]
exclude = [
    ".git", "__pycache__", ".venv", "alembic/versions",
    "frontend", "infrastructure",
]

[tool.ruff.per-file-ignores]
"backend/tests/*" = ["S101", "ANN"]  # allow assert in tests

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
disallow_untyped_defs = false
warn_return_any = false

[tool.coverage.run]
source = ["backend", "ai"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "alembic/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 70
