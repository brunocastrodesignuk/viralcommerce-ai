[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
    "--no-header",
    "-rN",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks integration tests that require real services",
]

[tool.ruff]
line-length = 100
target-version = "py312"
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
  "E501",    # line too long — handled by formatter
  "B008",    # do not perform function calls in default arguments
  "UP007",   # use X | Y instead of Optional[X]
  "B904",    # raise from err — intentional in FastAPI exception handlers
  "SIM105",  # use contextlib.suppress — try/except/pass is intentional here
  "SIM117",  # merge nested with statements — readability preference
  "F841",    # local variable assigned but never used — common in except as e
  "B007",    # loop control variable not used
]
exclude = [
    ".git", "__pycache__", ".venv", "alembic/versions",
    "frontend", "infrastructure",
]

[tool.ruff.per-file-ignores]
"backend/tests/*" = ["S101", "ANN"]  # allow assert in tests

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
disallow_untyped_defs = false
warn_return_any = false

[tool.coverage.run]
source = ["backend", "ai"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "alembic/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 70
