name: CI — Lint · Test · Build

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Python Lint ──────────────────────────────────────────────────────────
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Lint with ruff
        run: ruff check backend/ ai/ crawler/ --output-format=github

      - name: Check formatting
        run: ruff format --check backend/ ai/ crawler/

  # ── 2. Type checking ────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install mypy==1.10.0 pydantic==2.7.1 sqlalchemy==2.0.30 fastapi==0.111.0

      - name: Run mypy
        run: mypy backend/core/ backend/models/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # Warn but don't block on type errors yet

  # ── 3. Backend Tests ────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint-python

    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      REDIS_URL: "redis://localhost:6379/0"
      CELERY_BROKER_URL: "memory://"
      CELERY_RESULT_BACKEND: "cache+memory://"
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      ANTHROPIC_API_KEY: "sk-ant-test-00000000000000000000000"
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests with coverage
        run: |
          pytest backend/tests/ \
            --cov=backend \
            --cov=ai \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v \
            --tb=short \
            -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── 4. Frontend Lint & Build ─────────────────────────────────────────────────
  test-frontend:
    name: Frontend (Next.js build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings=20
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  # ── 5. Docker Build (no push on PR) ─────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.backend
          push: false
          tags: viralcommerce-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: infrastructure/docker/Dockerfile.frontend
          push: false
          tags: viralcommerce-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
