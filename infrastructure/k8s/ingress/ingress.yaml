apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: viralcommerce-ingress
  namespace: viralcommerce
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit-rps: "100"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.viralcommerce.ai
        - api.viralcommerce.ai
      secretName: viralcommerce-tls
  rules:
    - host: api.viralcommerce.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: viralcommerce-api
                port:
                  number: 80
    - host: app.viralcommerce.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: viralcommerce-frontend
                port:
                  number: 80
